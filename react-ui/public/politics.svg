<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="tricolor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF9933"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#128807"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  
  <!-- Outer circle with smooth borders -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGrad)" stroke="#1e3a8a" stroke-width="2" />
  
  <!-- Tricolor Banner Ribbon behind the dome -->
  <path d="M 15 52 Q 30 57 50 52 Q 70 47 85 52" fill="none" stroke="url(#tricolor)" stroke-width="6" stroke-linecap="round" opacity="0.65" />
  
  <!-- Stylized Indian Parliament Dome / Government Building -->
  <!-- Base -->
  <rect x="25" y="62" width="50" height="6" rx="2" fill="url(#gold)" />
  <!-- Pillars -->
  <line x1="30" y1="62" x2="30" y2="46" stroke="#f59e0b" stroke-width="3" />
  <line x1="38" y1="62" x2="38" y2="46" stroke="#f59e0b" stroke-width="3" />
  <line x1="46" y1="62" x2="46" y2="46" stroke="#f59e0b" stroke-width="3" />
  <line x1="54" y1="62" x2="54" y2="46" stroke="#f59e0b" stroke-width="3" />
  <line x1="62" y1="62" x2="62" y2="46" stroke="#f59e0b" stroke-width="3" />
  <line x1="70" y1="62" x2="70" y2="46" stroke="#f59e0b" stroke-width="3" />
  
  <!-- Architrave / Top beams -->
  <rect x="23" y="40" width="54" height="6" rx="1.5" fill="url(#gold)" />
  
  <!-- Dome -->
  <path d="M 33 40 Q 50 16 67 40 Z" fill="url(#gold)" opacity="0.95" />
  
  <!-- Spire tip -->
  <line x1="50" y1="16" x2="50" y2="8" stroke="#f59e0b" stroke-width="2" />
  <circle cx="50" cy="8" r="1.5" fill="#f59e0b" />
</svg>
