spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: political-sim-backend
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/political_sim}

server:
  port: ${PORT:7810}
allowed.origins: http://localhost:5173,https://political-sim.onrender.com
political-sim:
  default-state-name: West Bengal

logging:
  level:
    root: INFO
    # Your app packages — full DEBUG
    com.politicalsim: INFO
    # Spring Security — show filter chain decisions, CORS, blocked requests
    org.springframework.security: INFO
    # Spring Web — show incoming requests, mapped routes
    org.springframework.web: INFO
    # MongoDB — show queries
    org.springframework.data.mongodb: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
